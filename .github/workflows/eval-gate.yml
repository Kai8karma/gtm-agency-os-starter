name: eval-gate

on:
  pull_request:
    paths:
      - 'agents/**'
      - 'evals/**'
      - 'gtmos/**'
      - 'tests/**'
      - 'BRAND_GUIDELINES.md'
      - 'CLAUDE.md'
      - 'docs/PATTERNS.md'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'Makefile'
      - '.github/workflows/eval-gate.yml'
  push:
    branches: [main]

permissions:
  contents: read

# Pattern 8: every PR runs verify + eval. Below-threshold blocks merge.
# Pattern 16: server-side gate parallel to local hooks/pre-push.

jobs:
  verify:
    name: verify (doctrine)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --upgrade pip
      - run: pip install pyyaml
      - run: make verify

  eval:
    name: eval (agent regressions)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [verify]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Run eval (structural mode in CI by default)
        run: make eval
        env:
          GTMOS_OFFLINE: "1"
      # To run real-judge eval, configure ANTHROPIC_API_KEY as a repo secret
      # and remove `GTMOS_OFFLINE: "1"` above. Cost is per fixture × judge model.
      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-runs-${{ github.run_id }}
          path: runs/
          retention-days: 14
