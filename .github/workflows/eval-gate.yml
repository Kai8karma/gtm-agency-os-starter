name: eval-gate

on:
  pull_request:
    paths:
      - 'agents/**'
      - 'evals/**'
      - 'BRAND_GUIDELINES.md'
      - 'CLAUDE.md'
      - 'docs/PATTERNS.md'
      - 'scripts/**'
      - 'Makefile'
      - '.github/workflows/eval-gate.yml'
  push:
    branches: [main]

# Pattern 8: every PR runs verify + eval. Below-threshold blocks merge.
# Pattern 16: this is the Husky-equivalent server-side gate.

jobs:
  verify-and-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install eval deps
        run: pip install pyyaml

      - name: Run verify
        run: make verify

      - name: Run eval
        run: make eval
        env:
          # Pass the judge model API key from secrets when wiring real judging.
          # ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GTM_OS_EVAL_MODE: structural

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-runs-${{ github.run_id }}
          path: runs/
          retention-days: 14
